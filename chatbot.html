<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; }

        #chat-bubble {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: #FF6B35;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 9999;
        }

        #chat-window {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 350px;
            height: 500px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            display: none;
            flex-direction: column;
            z-index: 9999;
            overflow: hidden;
        }

        #chat-header {
            background: #FF6B35;
            color: white;
            padding: 16px;
            font-weight: bold;
            font-size: 16px;
        }

        #chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
        }

        .bot-message {
            background: #f0f0f0;
            color: #333;
            align-self: flex-start;
        }

        .user-message {
            background: #FF6B35;
            color: white;
            align-self: flex-end;
        }

        #chat-input-area {
            padding: 12px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 8px;
        }

        #chat-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        #send-btn {
            background: #FF6B35;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .typing {
            background: #f0f0f0;
            color: #999;
            align-self: flex-start;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<!-- This is a demo page — in real use, client puts their own website here -->
<div style="padding:40px; font-size:24px; color:#333;">
    👋 Welcome to Our Business Website
</div>

<!-- Chat Bubble -->
<div id="chat-bubble" onclick="toggleChat()">🤖</div>

<!-- Chat Window -->
<div id="chat-window">
    <div id="chat-header">💬 Chat with us — we reply instantly!</div>
    <div id="chat-messages">
        <div class="message bot-message">Hi! 👋 How can I help you today?</div>
    </div>
    <div id="chat-input-area">
        <input id="chat-input" type="text" placeholder="Type your message..." 
               onkeypress="if(event.key==='Enter') sendMessage()"/>
        <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    const GROQ_API_KEY = "YOUR_GROQ_API_KEY_HERE";
    const BUSINESS_PROMPT = `You are a helpful assistant for 
Star Academy, a tuition center in Karachi offering O-level 
and A-level tutoring. Monthly fee is Rs. 8,000 per subject. 
Classes are in DHA Phase 5. Answer parent questions warmly. 
If they want to enroll, ask for their child's name, grade, 
and phone number.`

    let conversationHistory = [];

    function toggleChat() {
        const window_ = document.getElementById('chat-window');
        window_.style.display = window_.style.display === 'flex' ? 'none' : 'flex';
    }

    function addMessage(text, isUser) {
        const messages = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        div.textContent = text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function showTyping() {
        const messages = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = 'typing';
        div.id = 'typing-indicator';
        div.textContent = 'Typing...';
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
        const typing = document.getElementById('typing-indicator');
        if (typing) typing.remove();
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const message = input.value.trim();
        if (!message) return;

        addMessage(message, true);
        input.value = '';
        showTyping();

        conversationHistory.push({ role: "user", content: message });

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${GROQ_API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'llama-3.3-70b-versatile',
                    messages: [
                        { role: "system", content: BUSINESS_PROMPT },
                        ...conversationHistory
                    ]
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;

            conversationHistory.push({ role: "assistant", content: reply });

            removeTyping();
            addMessage(reply, false);

        } catch (error) {
            removeTyping();
            addMessage("Sorry, I'm having trouble connecting. Please try again!", false);
        }
    }
</script>

</body>
</html>
